name: Validate Content
on: push

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate gzip integrity
        run: |
          # recommended_topics.txt is the legacy (pre-v2) plain-text format,
          # still served as-is for older app clients that haven't migrated
          # to the gzipped recommended_topics_v2.txt. It is intentionally
          # NOT gzipped — skip it here and validate it as plain text instead.
          LEGACY_PLAINTEXT_FILES="recommended_topics.txt"

          failed=0
          for f in *.txt; do
            is_legacy=0
            for legacy in $LEGACY_PLAINTEXT_FILES; do
              if [ "$f" = "$legacy" ]; then
                is_legacy=1
                break
              fi
            done

            if [ "$is_legacy" -eq 1 ]; then
              if [ -s "$f" ] && ! gunzip -t "$f" 2>/dev/null; then
                echo "✅ $f (legacy plain-text format, not gzipped by design)"
              else
                echo "❌ $f is expected to be legacy plain text, but looks gzipped — check if it was accidentally regenerated by the gzip pipeline"
                failed=1
              fi
              continue
            fi

            if ! gunzip -t "$f" 2>/dev/null; then
              echo "❌ INVALID GZIP: $f"
              failed=1
            else
              echo "✅ $f"
            fi
          done
          if [ $failed -eq 1 ]; then exit 1; fi

      - name: Check entry counts match
        if: "!contains(github.event.head_commit.message, '[skip-size-check]')"
        run: |
          # Each entry is wrapped in a pair of ''' markers (one open, one
          # close). Single-line entries (e.g. topic.txt) put both markers on
          # the same line; multi-line entries (title/subtitle/body) put them
          # on separate lines. Counting matching *lines* (grep -c) overcounts
          # multi-line entries 2x vs single-line ones, so count total '''
          # occurrences instead and divide by 2 to get the true entry count.
          count_entries() {
            local n
            n=$(gunzip -c "$1" | grep -o "'''" | wc -l | tr -d ' ')
            echo $(( n / 2 ))
          }

          topic=$(count_entries topic.txt)
          title=$(count_entries detail_page_title.txt)
          subtitle=$(count_entries detail_page_subtitle.txt)
          body=$(count_entries detail_page_body.txt)
          echo "Entries — topic:$topic title:$title subtitle:$subtitle body:$body"
          failed=0
          if [ "$topic" != "$title" ]; then echo "❌ MISMATCH: topic($topic) vs title($title)"; failed=1; fi
          if [ "$topic" != "$subtitle" ]; then echo "❌ MISMATCH: topic($topic) vs subtitle($subtitle)"; failed=1; fi
          if [ "$topic" != "$body" ]; then echo "❌ MISMATCH: topic($topic) vs body($body)"; failed=1; fi
          if [ $failed -eq 1 ]; then exit 1; fi
          echo "✅ All entry counts match"

      - name: Check for drastic file size changes
        if: "!contains(github.event.head_commit.message, '[skip-size-check]')"
        run: |
          declare -A expected_sizes
          expected_sizes[custom_messaging.txt]=52
          expected_sizes[detail_page_body.txt]=260903
          expected_sizes[detail_page_subtitle.txt]=23371
          expected_sizes[detail_page_title.txt]=25048
          expected_sizes[topic.txt]=6146
          expected_sizes[youtubeUrlsHD.txt]=3277
          expected_sizes[youtubeUrlsHdEnglish.txt]=4145
          expected_sizes[youtubeUrlsHdKashmiri-English.txt]=4156
          expected_sizes[recommended_topics_v2.txt]=330

          threshold=50
          failed=0
          for f in "${!expected_sizes[@]}"; do
            if [ ! -f "$f" ]; then continue; fi
            actual=$(wc -c < "$f" | tr -d ' ')
            expected=${expected_sizes[$f]}
            change=$(( (actual - expected) * 100 / expected ))
            abs_change=${change#-}
            if [ "$abs_change" -gt "$threshold" ]; then
              echo "⚠️  $f changed by ${change}% (expected ~${expected}B, got ${actual}B)"
              failed=1
            else
              echo "✅ $f (${change}% change)"
            fi
          done
          if [ $failed -eq 1 ]; then
            echo ""
            echo "❌ File size changed by more than ${threshold}%."
            echo "   If intentional, re-commit with [skip-size-check] in the message."
            exit 1
          fi
